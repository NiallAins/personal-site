<html>
<head>

    <title>
        Niall | Design & Dev
    </title>

    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <link rel="stylesheet" href="./style.css" />

</head>
<body>

    <canvas
        id="CAN_SKY"
        class="canvas__sky"
    ></canvas>

    <div class="header">
        <header class="header__title">
            <h1 class="header__title--primary">
                Niall Ainsworth
            </h1>
            <span class="header__title--secondary">
                Design / Development
            </span>
        </header>

        <nav class="header__nav">
            <div class="header__nav-links">
                <button class="header__nav-links-button">
                    Experience
                </button>
                <button class="header__nav-links-button">
                    Contact
                </button>
            </div>
            <div class="header__nav-more">
                <button
                    class="header__nav-more-button"
                    onclick="
                        window.scrollTo({
                            top: (window.innerHeight * 0.75),
                            behavior: 'smooth'
                        })
                    "
                >
                    Dive into Projects
                </button>
            </div>
        </nav>
    </div>

    <canvas
        id="CAN_SEA"
        class="canvas__sea"
    ></canvas>

    <main
        class="main"
    ></main>

    <section
        class="pages"
    ></section>

    <script src="./script.js"></script>

</body>
</html>
