<html>
<head>

    <title>
        Niall | Design & Dev
    </title>

    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <link rel="stylesheet" href="./style.css" />

</head>
<body>

    <canvas
        id="CAN_SKY"
        class="canvas__sky"
    ></canvas>

    <div class="splash">
        <header class="header">
            <h1 class="header__title">
                Niall Ainsworth
            </h1>
            <span class="header__subtitle">
                Design / Development
            </span>
        </header>

        <nav class="nav">
            <div class="nav__links">
                <button class="nav__links-button">
                    Experience
                </button>
                <button class="nav__links-button">
                    Contact
                </button>
            </div>
            <div class="nav__more">
                <button
                    class="nav__more-button"
                    onclick="
                        window.scrollTo({
                            top: (window.innerHeight * 0.75),
                            behavior: 'smooth'
                        })
                    "
                >
                    Dive into Projects
                </button>
            </div>
        </nav>
    </div>

    <canvas
        id="CAN_SEA"
        class="canvas__sea"
    ></canvas>

    <main class="main">
        <div class="main__topic">
            <button class="main__topic-button">
                Visuals
            </button>
        </div>
        <div class="main__topic">
            <button class="main__topic-button">
                Apps
            </button>
        </div>
        <div class="main__topic">
            <button class="main__topic-button">
                Sites
            </button>
        </div>
        <div class="main__topic">
            <button class="main__topic-button">
                Games
            </button>
        </div>
        <div class="main__topic">
            <button class="main__topic-button">
                Tools
            </button>
        </div>
    </main>

    <div
        id="sections"
        class="section__container"
    ></div>

    <script src="./script.js"></script>

</body>
</html>
