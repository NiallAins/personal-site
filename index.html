<html>
<head>

  <title>
    Niall | Design & Dev
  </title>

  <link rel="stylesheet" href="./style.css" />

</head>
<body>

  <canvas
    id="CAN_SKY"
    class="canvas__sky"
  ></canvas>

  <header class="header">
    <h1 class="header__title">
      Niall Ainsworth
    </h1>
    <span class="header__subtitle">
      Design / Development
    </span>
  </header>

  <canvas
    id="CAN_SEA"
    class="canvas__sea"
  ></canvas>

  <main class="main">
    <div class="main__link-container">
      <button class="main__link">
        Experience
      </button>
      <button class="main__link">
        Contact
      </button>
    </div>
    <div class="main__more-container">
      <button
        class="main__more"
        onclick="
          window.scrollTo({
            top: (window.innerHeight * 0.75),
            behavior: 'smooth'
          })
        "
      >
        Dive into Projects
      </button>
    </div>

    <div class="main__topic-container">
      <button class="main__topic">
        Visuals
      </button>
      <button class="main__topic">
        Apps
      </button>
      <button class="main__topic">
        Sites
      </button>
      <button class="main__topic">
        Games
      </button>
      <button class="main__topic">
        Tools
      </button>
    </div>
  </main>

  <div
    id="sections"
    class="section__container"
  ></div>

  <script src="./script.js"></script>

</body>
</html>
